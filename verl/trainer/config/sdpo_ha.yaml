defaults:
  - sdpo
  - _self_

# Assistant-response preference prompts can include multi-turn conversations plus
# two candidate answers, so keep LitBench-sized context defaults.
max_model_len: 20992

data:
  max_prompt_length: 4096
  max_response_length: 8192
  train_batch_size: 16

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 16
    policy_loss:
      loss_mode: sdpo
    self_distillation:
      max_reprompt_len: 12288
      is_clip: 2.0
      # Reward is 0-1. In margin mode, 0.5 means the judge saw no meaningful gap.
      success_reward_threshold: 0.7
      dont_reprompt_on_self_success: True
      remove_thinking_from_demonstration: True
      include_environment_feedback: True
      environment_feedback_only_without_solution: False
      alpha: 0.5
      full_logit_distillation: True
      distillation_topk: 100
      distillation_add_tail: True
      teacher_regularization: ema
      teacher_update_rate: 0.05
      reprompt_template: "{prompt}{solution}{feedback}\n\nGenerate a rubric for this assistant-response preference task. Produce an <analysis> block followed by a <rubric> block."
      solution_template: "\nHere is a rubric that successfully discriminated the preferred response from the non-preferred response:\n\n{successful_previous_attempt}\n\n"
      feedback_template: "\nFeedback on your previous rubric attempt:\n\n{feedback_raw}\n\n"
    optim:
      lr: 5e-6
  rollout:
    # Each rollout requires two judge API calls, one for preferred and one for non-preferred.
    n: 4
    temperature: 0.7
    calculate_log_probs: True

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: False
  rollout_correction:
    rollout_is: token
    rollout_is_threshold: 2.0

reward_model:
  reward_manager: batch

custom_reward_function:
  path: environments/ha_rubric_verl/reward_fn.py
  name: compute_score

trainer:
  val_before_train: False
  test_freq: 5
